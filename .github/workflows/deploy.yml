name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload changed files and rebuild
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASS }}
          script_stop: true
          envs: GITHUB_SHA
          script: |
            set -e
            git config --global --add safe.directory /opt/petit
            cd /opt/petit

            git fetch origin main
            git checkout -f origin/main

            docker-compose build
            docker-compose down
            docker-compose up -d

            echo "Deploy OK — commit $GITHUB_SHA"
